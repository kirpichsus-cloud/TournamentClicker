<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esports Clicker: Squad Edition</title>
    <style>
        body {
            background-color: #121214;
            color: #ffffff;
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            user-select: none;
            -webkit-user-select: none;
        }
        h1 { color: #00ff66; font-size: 24px; margin-bottom: 5px; }
        .stats-container {
            background: #1e1e24;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .stat { font-size: 18px; margin: 5px 0; }
        #click-btn {
            background: linear-gradient(135deg, #00ff66, #0077ff);
            border: none;
            color: white;
            padding: 35px 20px;
            width: 80%;
            max-width: 300px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50%;
            margin: 15px auto;
            box-shadow: 0 6px 20px rgba(0, 255, 102, 0.4);
            transition: transform 0.1s;
        }
        #click-btn:active { transform: scale(0.95); }
        .section {
            background: #1e1e24;
            padding: 15px;
            border-radius: 12px;
            margin-top: 15px;
            text-align: left;
        }
        h3 { margin-top: 0; color: #0077ff; text-align: center; }
        
        .leaderboard-list { list-style: none; padding: 0; margin: 0; }
        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 12px;
            background: #25252e;
            margin-bottom: 5px;
            border-radius: 6px;
            font-size: 15px;
        }
        .leaderboard-item.me {
            border: 1px solid #00ff66;
            background: #1a2e22;
        }

        /* КРАСИВОЕ МОДЛЬНОЕ ОКНО ДЛЯ IPHONE */
        #login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(18, 18, 20, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .login-box {
            background: #1e1e24;
            padding: 30px 20px;
            border-radius: 16px;
            width: 85%;
            max-width: 320px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }
        .login-box input {
            width: 90%;
            padding: 12px;
            margin: 15px 0;
            border-radius: 8px;
            border: 1px solid #444;
            background: #121214;
            color: white;
            font-size: 16px;
            text-align: center;
        }
        .login-box button {
            background: #00ff66;
            color: #121214;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }
    </style>

    <!-- Подключаем Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <!-- Всплывающее окно ввода ника -->
    <div id="login-overlay">
        <div class="login-box">
            <h2 style="margin-top:0; color:#00ff66;">Вход в игру</h2>
            <p style="color:#aaa; font-size:14px;">Придумай свой киберспортивный ник:</p>
            <input type="text" id="nickname-input" placeholder="Например: S1mple" maxlength="14">
            <button onclick="saveNickname()">ПОГНАТЬ!</button>
        </div>
    </div>

    <h1>🏆 ESPORTS CLICKER</h1>
    <p style="color: #888; margin-top: 0;">Привет, <span id="player-name" style="color:#00ff66;">Игрок</span>!</p>

    <div class="stats-container">
        <div class="stat">🧠 Твой Скилл: <span id="skill-text">0</span></div>
    </div>

    <button id="click-btn" onclick="trainSkill()">ТРЕНИРОВАТЬСЯ</button>

    <div class="section">
        <h3>📊 Стрик Друзей (Live-Топ)</h3>
        <ul class="leaderboard-list" id="leaderboard">
            <li style="color: #aaa; text-align: center;">Загрузка топа...</li>
        </ul>
    </div>

    <script>
        // Конфиг базы
        const firebaseConfig = {
            databaseURL: "https://esports-clicker-default-rtdb.europe-west1.firebasedatabase.app/"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let skill = 0;
        let username = localStorage.getItem('esports_username');

        // Проверяем, есть ли ник в памяти телефона
        if (username) {
            document.getElementById('login-overlay').style.display = 'none';
            initGame();
        }

        // Функция сохранения ника по кнопке
        function saveNickname() {
            let inputName = document.getElementById('nickname-input').value.trim();
            if (inputName === "") {
                alert("Ник не может быть пустым!");
                return;
            }
            // Убираем запрещенные для Firebase символы
            username = inputName.replace(/[.#$/\[\]]/g, "");
            localStorage.setItem('esports_username', username);
            
            // Скрываем окно ввода и запускаем игру
            document.getElementById('login-overlay').style.display = 'none';
            initGame();
        }

        // Запуск подгрузки данных
        function initGame() {
            document.getElementById('player-name').innerText = username;
            const skillText = document.getElementById('skill-text');

            // Подгружаем старый прогресс, если он был
            database.ref('players/' + username).once('value').then((snapshot) => {
                if (snapshot.exists()) {
                    skill = snapshot.val().skill || 0;
                    skillText.innerText = skill;
                }
            });

            // Включаем Live-обновление топа
            startLeaderboard();
        }

        // Клик
        function trainSkill() {
            if (!username) return;
            skill += 1;
            document.getElementById('skill-text').innerText = skill;
            
            database.ref('players/' + username).set({
                skill: skill,
                lastUpdate: Date.now()
            });
        }

        // Работа топа
        function startLeaderboard() {
            const leaderboardEl = document.getElementById('leaderboard');
            database.ref('players').orderByChild('skill').limitToLast(10).on('value', (snapshot) => {
                let players = [];
                snapshot.forEach((childSnapshot) => {
                    players.push({
                        name: childSnapshot.key,
                        skill: childSnapshot.val().skill
                    });
                });

                players.reverse();
                leaderboardEl.innerHTML = "";
                
                players.forEach((player, index) => {
                    const isMe = player.name === username ? 'me' : '';
                    leaderboardEl.innerHTML += `
                        <li class="leaderboard-item ${isMe}">
                            <span>${index + 1}. <b>${player.name}</b></span>
                            <span style="color: #00ff66;">${player.skill} Скилла</span>
                        </li>
                    `;
                });
            });
        }
    </script>
</body>
</html>
